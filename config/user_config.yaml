# ============================================================
#  STOCK SCREENER - KONFIGURACJA UŻYTKOWNIKA
#  Edytuj ten plik, aby dostosować screener do swoich potrzeb
# ============================================================

# --- ŹRÓDŁO DANYCH ---
source:
  # Dostępne opcje: "sp500", "nasdaq100", "wig20", "custom"
  index: "sp500"
  # Używane tylko gdy index: "custom"
  custom_tickers: []
    # - "AAPL"
    # - "MSFT"
    # - "GOOGL"

# --- POBIERANE METRYKI ---
metrics:
  fundamental:
    enabled: true
    fields:
      - pe_ratio          # Cena / Zysk
      - pb_ratio          # Cena / Wartość księgowa
      - ps_ratio          # Cena / Przychody
      - roe               # Zwrot z kapitału własnego (%)
      - roa               # Zwrot z aktywów (%)
      - debt_to_equity    # Wskaźnik zadłużenia
      - current_ratio     # Płynność bieżąca
      - revenue_growth    # Wzrost przychodów YoY (%)
      - earnings_growth   # Wzrost zysku YoY (%)
      - profit_margin     # Marża zysku netto (%)
      - dividend_yield    # Stopa dywidendy (%)
      - market_cap        # Kapitalizacja rynkowa (USD)

  technical:
    enabled: true
    fields:
      - momentum_1m       # Zmiana ceny 1 miesiąc (%)
      - momentum_3m       # Zmiana ceny 3 miesiące (%)
      - momentum_6m       # Zmiana ceny 6 miesięcy (%)
      - momentum_12m      # Zmiana ceny 12 miesięcy (%)
      - rsi_14            # RSI 14 dni
      - volume_ratio      # Wolumen / Średni wolumen 20-dniowy
      - above_ma50        # Cena powyżej MA50 (bool)
      - above_ma200       # Cena powyżej MA200 (bool)
      - volatility_30d    # Zmienność 30-dniowa (odch. stand. zwrotów, %)

# --- FILTRY / PROGI ---
# Syntax: [min, max] – użyj null jeśli brak ograniczenia z danej strony
# Przykład: [0, 25] oznacza: metryka musi być >= 0 i <= 25
filters:
  fundamental:
    pe_ratio:       [0, 35]       # P/E między 0 a 35 (odrzucamy ujemne i przegrzane)
    pb_ratio:       [0, 8]        # P/BV do 8x
    roe:            [8, null]     # ROE minimum 8%
    debt_to_equity: [null, 1.5]   # D/E maksimum 1.5
    current_ratio:  [1.0, null]   # Płynność min 1.0
    revenue_growth: [0, null]     # Rosnące przychody (>= 0%)
    profit_margin:  [5, null]     # Marża netto min 5%
    market_cap:     [1e9, null]   # Tylko large/mid cap (>= 1 mld USD)

  technical:
    rsi_14:         [30, 70]      # Unikamy wyprzedanych i wykupionych
    momentum_3m:    [0, null]     # Pozytywne momentum 3M
    volume_ratio:   [0.5, null]   # Wolumen przynajmniej 50% średniej

# --- SCORING (wagi dla rankingu) ---
# Metryki z wagą > 0 podnoszą score, < 0 obniżają
# Wynik końcowy = suma(waga * znormalizowana_metryka)
scoring:
  weights:
    roe:            2.0    # Wysoka waga dla rentowności
    revenue_growth: 1.5
    earnings_growth: 1.5
    profit_margin:  1.5
    momentum_3m:    1.0
    momentum_6m:    1.0
    pe_ratio:      -0.5   # Wyższe P/E = niższy score (preferujemy tańsze)
    debt_to_equity: -1.0  # Wyższe zadłużenie = niższy score
    rsi_14:         0.3   # Lekka premia za momentum

# --- PORTFEL ---
portfolio:
  # Ile spółek w portfelu
  max_positions: 20
  # Minimalna liczba wyników, żeby zbudować portfel
  min_results: 5
  # Strategia ważenia: "equal", "score_weighted", "rank_weighted"
  weighting: "score_weighted"
  # Minimalna liczba iteracji historycznych do analizy stabilności
  min_history_runs: 3
  # Bonus za pojawianie się w poprzednich iteracjach (stabilność)
  stability_bonus_weight: 0.5

# --- SCHEDULER ---
scheduler:
  # Czy uruchamiać automatycznie
  enabled: false
  # Częstotliwość: "daily", "weekly", "monthly"
  frequency: "weekly"
  # Godzina uruchomienia (format 24h)
  run_at_hour: 7
  # Dzień tygodnia dla "weekly" (0=Poniedzialek, 6=Niedziela)
  weekday: 0

# --- PARAMETRY TECHNICZNE ---
settings:
  # Równoległe pobieranie danych (liczba wątków)
  fetch_workers: 5
  # Przerwa między zapytaniami do API (sekundy) – grzeczność wobec Yahoo Finance
  api_delay_seconds: 0.3
  # Ścieżka do pliku bazy danych SQLite
  db_path: "screener_data.db"
  # Katalog dla raportów CSV
  reports_dir: "reports"
  # Poziom logowania: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  # Ile dni wstecz pobierać historię cen
  price_history_days: 400
  # Maksymalna liczba błędów przy fetchowaniu przed porzuceniem tickera
  max_fetch_errors: 3
