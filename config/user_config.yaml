# ============================================================
#  STOCK SCREENER - KONFIGURACJA UŻYTKOWNIKA
#  Edytuj ten plik, aby dostosować screener do swoich potrzeb
# ============================================================

# ── ŹRÓDŁO TICKERÓW (AI-generated) ──────────────────────────
source:
  # Strategia selekcji spółek przez AI:
  #   growth_quality    – wzrost + jakość fundamentalna (DOMYŚLNA)
  #   deep_value        – spółki niedowartościowane z marżą bezpieczeństwa
  #   compounders       – długoterminowe compoundersy, najwyższa jakość
  #   sector_leaders    – liderzy wybranego sektora (wymaga ai.sector)
  #   thematic          – ekspozycja na megatrend (wymaga ai.theme)
  #   global_diversified – szeroki globalny portfel badawczy
  strategy: "growth_quality"

  ai:
    # Backend LLM:
    #   groq       – DARMOWY: https://console.groq.com (bez karty kredytowej)
    #                Ustaw: export GROQ_API_KEY=gsk_...
    #   anthropic  – Claude (platny): export ANTHROPIC_API_KEY=sk-ant-...
    #   openai     – GPT-4o (platny): export OPENAI_API_KEY=sk-...
    #   mock       – tryb testowy bez API key
    backend: "groq"
    api_key_env: "GROQ_API_KEY"

    # Model: llama-3.3-70b-versatile | llama-3.1-8b-instant
    model: "llama-3.3-70b-versatile"

    # Liczba tickerów (zalecane: 30-80)
    n_tickers: 50
    temperature: 0.35
    max_retries: 3

    # Parametry strategii:
    sector: "technology"                    # dla strategy: sector_leaders
    theme: "artificial intelligence"        # dla strategy: thematic

    # Multi-shot: wiele zapytań AI = szersze universum (~150-200 spolki)
    multi_shot: false
    multi_shot_runs: 3


# ── POBIERANE METRYKI ────────────────────────────────────────
metrics:
  fundamental:
    enabled: true
    fields:
      - pe_ratio
      - pb_ratio
      - ps_ratio
      - roe
      - roa
      - debt_to_equity
      - current_ratio
      - revenue_growth
      - earnings_growth
      - profit_margin
      - dividend_yield
      - market_cap

  technical:
    enabled: true
    fields:
      - momentum_1m
      - momentum_3m
      - momentum_6m
      - momentum_12m
      - rsi_14
      - volume_ratio
      - above_ma50
      - above_ma200
      - volatility_30d


# ── FILTRY / PROGI ───────────────────────────────────────────
filters:
  fundamental:
    pe_ratio:       [0, 60]
    pb_ratio:       [0, 20]
    roe:            [10, null]
    debt_to_equity: [null, 2.0]
    current_ratio:  [0.8, null]
    revenue_growth: [0, null]
    profit_margin:  [3, null]
    market_cap:     [5e8, null]

  technical:
    rsi_14:         [25, 80]
    volume_ratio:   [0.3, null]


# ── SCORING ──────────────────────────────────────────────────
scoring:
  weights:
    roe:             2.0
    revenue_growth:  1.8
    earnings_growth: 1.5
    profit_margin:   1.2
    momentum_6m:     1.0
    momentum_3m:     0.8
    rsi_14:          0.3
    pe_ratio:       -0.4
    debt_to_equity: -0.8


# ── PORTFEL ──────────────────────────────────────────────────
portfolio:
  max_positions: 20
  min_results: 5
  weighting: "score_weighted"
  min_history_runs: 3
  stability_bonus_weight: 0.5


# ── SCHEDULER ────────────────────────────────────────────────
scheduler:
  enabled: false
  frequency: "weekly"
  run_at_hour: 7
  weekday: 0


# ── USTAWIENIA TECHNICZNE ─────────────────────────────────────
settings:
  fetch_workers: 5
  api_delay_seconds: 0.3
  db_path: "screener_data.db"
  reports_dir: "reports"
  log_level: "INFO"
  price_history_days: 400
  max_fetch_errors: 3
